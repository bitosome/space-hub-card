          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
            graph_span: 48h
            span:
              start: day
            apex_config:
              chart:
                height: 200
                stacked: false
                toolbar:
                  show: false
              legend:
                show: false
              grid:
                show: true
                borderColor: '#404040'
              tooltip:
                fixed:
                  enabled: true
                  position: topLeft
                offsetX: -10
                offsetY: -10
                shared: false
                x:
                  format: MMM dd, HH:mm
                'y':
                  formatter: |
                    EVAL:function(value) {
                      if (value === null || typeof value === 'undefined' || Number.isNaN(Number(value))) 
                        return '';
                      return Number(value).toFixed(4) + ' €/kWh';
                    }
              xaxis:
                type: datetime
                tickAmount: 48
                labels:
                  format: HH:mm
                  datetimeUTC: false
                  rotate: -45
                min: |
                  EVAL:function() { 
                    var start = new Date();
                    start.setHours(0, 0, 0, 0);
                    return start.getTime();
                  }
                max: |
                  EVAL:function() { 
                    var end = new Date();
                    end.setDate(end.getDate() + 2);
                    end.setHours(0, 0, 0, 0);
                    return end.getTime();
                  }
              yaxis:
                - title:
                    text: Price (€/kWh)
                  labels:
                    formatter: |
                      EVAL:function(value) {
                        if (value === null || typeof value === 'undefined' || Number.isNaN(Number(value))) 
                          return '';
                        return Number(value).toFixed(4) + ' €';
                      }
                  min: 0
              plotOptions:
                bar:
                  columnWidth: 80%
                  endingShape: round
                  borderRadius: 3
                  distributed: true
              dataLabels:
                enabled: false
              stroke:
                width: 0
              fill:
                opacity: 1
            series:
              - entity: sensor.real_electricity_price_current_price
                name: Current price
                type: line
                stroke_width: 2
                float_precision: 4
                unit: €/kWh
                show:
                  in_header: true
                  in_chart: false
                  in_legend: false
                data_generator: >
                  var out = []; var nowts = new Date().getTime(); var v = null;
                  if (entity && entity.state && entity.state !== 'unknown' &&
                  entity.state !== 'unavailable') {
                    v = Number(entity.state);
                  } out.push([nowts, v]); return out;
              - entity: sensor.real_electricity_price_chart_data
                type: column
                name: Electricity Prices
                float_precision: 4
                unit: €/kWh
                show:
                  in_header: false
                  in_chart: true
                  in_legend: false
                data_generator: |
                  return entity?.attributes?.chart_data || [];
          - type: vertical-stack
            cards:
              - type: custom:mushroom-chips-card
                chips:
                  - type: template
                    entity: sensor.real_electricity_price_current_price
                    content: >-
                      {{ states('sensor.real_electricity_price_current_price')
                      }} €/kWh
                    icon: mdi:currency-eur
                    icon_color: >-
                      {% if
                      states('sensor.real_electricity_price_current_price')|float(0)
                           <= states('number.real_electricity_price_acceptable_price')|float(0) %}
                        green
                      {% else %}
                        red
                      {% endif %}
                    tap_action:
                      action: more-info
              - type: custom:mushroom-template-card
                entity: sensor.smartevse_state
                entity_id:
                  - sensor.smartevse_state
                  - sensor.smartevse_evplugstate
                  - select.smartevse_mode
                  - sensor.smartevse_chargecurrent
                  - input_boolean.charging_schedule_state
                  - schedule.charge_schedule
                  - input_boolean.force_charge_state
                  - >-
                    input_boolean.force_charge_with_acceptable_electricity_price_state
                  - input_boolean.force_charge_with_timer_state
                  - number.real_electricity_price_acceptable_price
                  - input_datetime.force_charge_time
                primary: |-
                  {% if is_state('sensor.smartevse_evplugstate','Connected') %}
                    {% set s = states('sensor.smartevse_state')|trim %}
                    {% if s == 'Charging' %}
                      Charging
                    {% elif s == 'Ready to Charge' %}
                      Ready to charge
                    {% elif s == 'Connected to EV' %}
                      Connected to EV
                    {% elif s == 'Charging Stopped' %}
                      Charging stopped
                    {% elif s == 'Stop Charging' %}
                      Charging stopping
                    {% else %}
                      Idle
                    {% endif %}
                  {% else %}
                    Unplugged
                  {% endif %}
                secondary: >-
                  {%- set gate =
                  is_state('input_boolean.charging_schedule_state','on') -%} {%-
                  if gate -%}
                    {%- set sched_on = is_state('schedule.charge_schedule','on') -%}
                    {%- set ne = state_attr('schedule.charge_schedule','next_event') -%}
                    {%- if sched_on -%}
                  Schedule: On now{%- if ne -%}, ends {{ as_timestamp(ne) |
                  timestamp_custom('%a %H:%M', true) }}{%- endif -%}
                    {%- else -%}
                  Schedule: armed{%- if ne -%}, starts at {{ as_timestamp(ne) |
                  timestamp_custom('%a %H:%M', true) }}{%- endif -%}
                    {%- endif -%}
                  {%- else -%} Schedule: Disabled {%- endif -%}

                  {{ '\n' }}Plug: {{ states('sensor.smartevse_evplugstate') }}

                  Mode: {{ states('select.smartevse_mode') }}

                  Charging current: {{ states('sensor.smartevse_chargecurrent')
                  }} A
                icon: >-
                  {% set s = states('sensor.smartevse_state')|trim %} {% if not
                  is_state('sensor.smartevse_evplugstate','Connected') %}
                    mdi:power-plug-off-outline
                  {% elif s == 'Charging' %}
                    mdi:ev-station
                  {% elif s in ['Ready to Charge','Connected to EV'] %}
                    mdi:ev-plug-type2
                  {% else %}
                    mdi:ev-station
                  {% endif %}
                multiline_secondary: true
                tap_action:
                  action: none
                color: >-
                  {% set s = states('sensor.smartevse_state')|trim %} {% if s ==
                  'Charging' %}
                    amber
                  {% elif is_state('sensor.smartevse_evplugstate','Connected')
                  %}
                    blue
                  {% else %}
                    grey
                  {% endif %}
                features_position: bottom
              - type: custom:mushroom-template-card
                entity: input_boolean.force_charge_state
                primary: Force charge
                secondary: |-
                  {% if is_state('input_boolean.force_charge_state','on') %}
                    {% if not is_state('sensor.smartevse_evplugstate','Connected') %}
                      Waiting EV Plug to be connected
                    {% else %}
                      Active
                    {% endif %}
                  {% else %}
                    Tap to start
                  {% endif %}
                icon: mdi:lightning-bolt
                icon_color: >-
                  {% if is_state('input_boolean.force_charge_state','on') and
                  not is_state('sensor.smartevse_evplugstate','Connected') %}
                    orange
                  {% elif is_state('input_boolean.force_charge_state','on') %}
                    green
                  {% else %}
                    grey
                  {% endif %}
                tap_action:
                  action: toggle
                hold_action:
                  action: more-info
                fill_container: true
              - type: custom:mushroom-template-card
                entity: >-
                  input_boolean.force_charge_with_acceptable_electricity_price_state
                primary: >-
                  Force charge when ≤ {{
                  states('number.real_electricity_price_acceptable_price') }}
                  €/kWh
                secondary: >-
                  {% if
                  is_state('input_boolean.force_charge_with_acceptable_electricity_price_state','on')
                  %}
                    {% if not is_state('sensor.smartevse_evplugstate','Connected') %}
                      Waiting EV Plug to be connected
                    {% else %}
                      {% set price = states('sensor.real_electricity_price_current_price')|float(0) %}
                      {% set accept = states('number.real_electricity_price_acceptable_price')|float(0) %}
                      {% if price <= accept %}
                        Acceptable price, charging
                      {% else %}
                        Waiting for price
                      {% endif %}
                    {% endif %}
                  {% else %}
                    Tap to arm
                  {% endif %}
                icon: mdi:currency-eur
                tap_action:
                  action: toggle
                hold_action:
                  action: more-info
                color: >-
                  {% if
                  is_state('input_boolean.force_charge_with_acceptable_electricity_price_state','on')
                  and not is_state('sensor.smartevse_evplugstate','Connected')
                  %}
                    orange
                  {% elif
                  is_state('input_boolean.force_charge_with_acceptable_electricity_price_state','on')
                  %}
                    green
                  {% else %}
                    grey
                  {% endif %}
                features_position: bottom
              - type: custom:mushroom-template-card
