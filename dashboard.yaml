views:
  - type: sections
    max_columns: 1
    title: Summary
    path: summary
    icon: mdi:sigma
    sections:
      - type: grid
        cards:
          - show_current: true
            show_forecast: true
            type: weather-forecast
            entity: weather.forecast_home
            forecast_type: hourly
            secondary_info_attribute: wind_speed
            forecast_slots: 7
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
              floating: false
            graph_span: 24h
            apex_config:
              legend:
                show: false
              chart:
                height: 150px
            all_series_config:
              stroke_width: 2
            yaxis:
              - id: temp
                decimals: 1
              - id: hum
                opposite: true
                decimals: 0
            series:
              - entity: sensor.outdoors_temperature_average
                name: Temp
                yaxis_id: temp
                unit: °C
                float_precision: 1
                show:
                  in_header: true
                  name_in_header: true
              - entity: sensor.outdoors_temperature_average
                name: Min
                yaxis_id: temp
                unit: °C
                float_precision: 1
                group_by:
                  duration: 24h
                  func: min
                stroke_width: 0
                opacity: 0
                show:
                  in_header: true
                  name_in_header: true
                  legend_value: false
              - entity: sensor.outdoors_temperature_average
                name: Max
                yaxis_id: temp
                unit: °C
                float_precision: 1
                group_by:
                  duration: 24h
                  func: max
                stroke_width: 0
                opacity: 0
                show:
                  in_header: true
                  name_in_header: true
                  legend_value: false
              - entity: sensor.aqara_thp_9_humidity
                name: Hum
                yaxis_id: hum
                unit: '%'
                float_precision: 0
                type: line
                show:
                  in_header: true
                  name_in_header: true
          - type: custom:mushroom-template-card
            primary: >-
              Average home temperature: {{
              states('sensor.home_temperature_average') }}°C
            secondary: >-
              Average home humidity: {{ states('sensor.home_humidity_average')
              }}%
            icon: mdi:home-thermometer-outline
            fill_container: false
            multiline_secondary: false
            tap_action:
              action: navigate
              navigation_path: /utility-room/thermostats
            icon_color: orange
            grid_options:
              columns: 12
              rows: 1
          - type: custom:space-hub-card
            tile_height: 80
            main_icon_size: 40
            chip_icon_size: 14
            chip_font_size: 12
            card_shadow_color: '#000000'
            card_shadow_intensity: 0.1
            unavailable_pulse_color: '#ff3b30'
            headers:
              - main:
                  main_name: Outdoors
                  main_icon: mdi:tree-outline
                  light_group_entity: light.outdoor_lights
                  glow_mode: static
                  tap_action:
                    action: navigate
                    navigation_path: /lovelace/rooms?anchor=outdoors
                  hold_action:
                    action: call-service
                    service: homeassistant.turn_off
                    service_data:
                      entity_id: light.outdoor_lights
                  temp_sensor: sensor.outdoors_temperature_average
                  humidity_sensor: sensor.aqara_thp_9_humidity
                  chips:
                    - type: smart_plug
                      entity: switch.ikea_tretakt_smart_plug_2
                      icon_active: mdi:patio-heater
                      icon_inactive: mdi:patio-heater
                    - type: sliding_gate
                      entity: binary_sensor.shelly_blu_door_window_1_open
                    - type: gate
                      entity: binary_sensor.shelly_blu_door_window_2_open
                    - type: illuminance
                      entity: sensor.outdoor_ambient_sensor_illuminance
              - main:
                  main_name: Entrance
                  main_icon: mdi:door
                  light_group_entity: light.entrance_lights
                  glow_mode: static
                  tap_action:
                    action: navigate
                    navigation_path: /lovelace/rooms?anchor=entrance
                  hold_action:
                    action: call-service
                    service: homeassistant.turn_off
                    service_data:
                      entity_id: light.entrance_lights
                  temp_sensor: sensor.aqara_thp_10_temperature
                  humidity_sensor: sensor.aqara_thp_10_humidity
                  chips:
                    - type: lock
                      entity: lock.front_door
                thermostat:
                  entity: >-
                    climate.thermostat_controller_wc_1_entrance_hallway_storeroom
                  glow_mode: pulse
              - main:
                  main_name: Hallway
                  main_icon: mdi:transit-connection
                  light_group_entity: light.hallway_lights
                  glow_mode: static
                  tap_action:
                    action: navigate
                    navigation_path: /lovelace/rooms?anchor=hallway
                  hold_action:
                    action: call-service
                    service: homeassistant.turn_off
                    service_data:
