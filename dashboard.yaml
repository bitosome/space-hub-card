          - type: tile
            entity: automation.turn_off_ac
            features_position: bottom
            vertical: false
            name: Automatically turn off ACs
            grid_options:
              columns: full
              rows: 1
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
            graph_span: 48h
            span:
              start: day
            apex_config:
              chart:
                height: 200
              grid:
                show: true
                borderColor: '#404040'
              plotOptions:
                bar:
                  columnWidth: 90%
                  borderRadiusApplication: end
                  borderRadius: 3
              tooltip:
                fixed:
                  enabled: true
                  position: topLeft
                x:
                  format: dd. MMM, HH:mm
                'y':
                  formatter: |
                    EVAL:function(value) {
                      if (value === null || typeof value === 'undefined' || Number.isNaN(Number(value))) 
                        return '';
                      return Number(value).toFixed(4) + ' €/kWh';
                    }
              xaxis:
                type: datetime
                tickAmount: 48
                min: |
                  EVAL:function() { 
                    var start = new Date();
                    start.setHours(0, 0, 0, 0);
                    return start.getTime();
                  }
                max: |
                  EVAL:function() { 
                    var end = new Date();
                    end.setDate(end.getDate() + 2);
                    end.setHours(0, 0, 0, 0);
                    return end.getTime();
                  }
              yaxis:
                - title:
                    text: €/kWh
                  labels:
                    formatter: |
                      EVAL:function(value) {
                        if (value === null || typeof value === 'undefined' || Number.isNaN(Number(value))) 
                          return '';
                        return Number(value).toFixed(2) + '€';
                      }
                  min: 0
            series:
              - entity: sensor.real_electricity_price_current_price
                name: Current price
                type: line
                stroke_width: 1
                float_precision: 4
                unit: €/kWh
                show:
                  in_header: true
                  in_chart: false
                  in_legend: false
              - entity: sensor.real_electricity_price_chart_data
                type: column
                name: Price
                float_precision: 4
                unit: €/kWh
                show:
                  in_header: false
                  in_chart: true
                  in_legend: false
                data_generator: |
                  return entity?.attributes?.chart_data || [];
          - type: horizontal-stack
            cards:
              - type: custom:mini-graph-card
                entities:
                  - sensor.shelly_pro_3em_1_phase_a_current
                line_color: brown
                line_width: 8
                font_size: 75
                name: L1 (A)
                icon: mdi:home-lightning-bolt
                update_interval: 5
                hour24: true
                align_icon: left
                animate: true
              - type: custom:mini-graph-card
                entities:
                  - sensor.shelly_pro_3em_1_phase_b_current
                line_color: black
                line_width: 8
                font_size: 75
                name: L2 (B)
                icon: mdi:home-lightning-bolt
                update_interval: 5
                hour24: true
                align_icon: left
                animate: true
              - type: custom:mini-graph-card
                entities:
                  - sensor.shelly_pro_3em_1_phase_c_current
                line_color: grey
                line_width: 8
                font_size: 75
                name: L3 (C)
                icon: mdi:home-lightning-bolt
                update_interval: 5
                hour24: true
                align_icon: left
                animate: true
          - type: horizontal-stack
            cards:
              - type: custom:mini-graph-card
                entities:
                  - sensor.shelly_pro_3em_2_phase_a_current
                line_color: brown
                line_width: 8
                font_size: 75
                name: L1 (A)
                icon: mdi:car-electric
                update_interval: 5
                hour24: true
                align_icon: left
                animate: true
              - type: custom:mini-graph-card
                entities:
                  - sensor.shelly_pro_3em_2_phase_b_current
                line_color: black
                line_width: 8
                font_size: 75
                name: L2 (B)
                icon: mdi:car-electric
                update_interval: 5
                hour24: true
                align_icon: left
                animate: true
              - type: custom:mini-graph-card
                entities:
                  - sensor.shelly_pro_3em_2_phase_c_current
                line_color: grey
                line_width: 8
                font_size: 75
                name: L3 (C)
                icon: mdi:car-electric
                update_interval: 5
                hour24: true
                align_icon: left
                animate: true
          - type: custom:mushroom-template-card
            entity: timer.mute_overcurrent_notifications_timer
            primary: Overcurrent notifications
            secondary: |
              {% if is_state(entity, 'active') %}
                {% set f = state_attr(entity, 'finishes_at') %}
                Muted until {{ as_local(as_datetime(f)).strftime('%H:%M') }} (tap to unmute)
              {% else %}
                Active (tap to mute for 1h)
              {% endif %}
            icon: |
              {% if is_state(entity, 'active') %}
                mdi:bell-off
              {% else %}
                mdi:bell
              {% endif %}
            icon_color: |
              {% if is_state(entity, 'active') %}
                red
              {% else %}
                green
              {% endif %}
            tap_action:
              action: call-service
              service: script.toggle_overcurrent_notifications_mute
            hold_action:
              action: more-info
            grid_options:
              columns: full
