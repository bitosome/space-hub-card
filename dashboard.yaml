                  temp_sensor: sensor.kitchen_living_room_temperature_average
                  humidity_sensor: sensor.kitchen_living_room_humidity_average
                ac:
                  entity: climate.living_room_ac
                  glow_mode: pulse
                thermostat:
                  entity: climate.thermostat_controller_kitchen_living_room
                  glow_mode: pulse
              - main:
                  main_name: Bedroom
                  main_icon: mdi:sleep
                  light_group_entity: light.bedroom_lights
                  glow_mode: static
                  tap_action:
                    action: navigate
                    navigation_path: /lovelace/rooms?anchor=bedroom
                  hold_action:
                    action: call-service
                    service: homeassistant.turn_off
                    service_data:
